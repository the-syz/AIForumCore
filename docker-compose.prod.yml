version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aiforum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aiforum
      MYSQL_USER: ${MYSQL_USER:-aiforum}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=50
      - --table-open-cache=64
      - --thread-cache-size=8
      - --key-buffer-size=8M
      - --query-cache-size=0
      - --query-cache-type=0
      - --performance-schema=OFF
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backup:/backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - aiforum-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:6-alpine
    container_name: aiforum-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aiforum-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: aiforum-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://${MYSQL_USER:-aiforum}:${MYSQL_PASSWORD}@mysql:3306/aiforum
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ZHIPU_API_KEY_1=${ZHIPU_API_KEY_1}
      - ZHIPU_API_KEY_2=${ZHIPU_API_KEY_2}
      - ZHIPU_API_KEY_3=${ZHIPU_API_KEY_3}
      - ZHIPU_API_KEY_4=${ZHIPU_API_KEY_4}
      - ZHIPU_API_KEY_5=${ZHIPU_API_KEY_5}
      - OCR_API_KEY=${OCR_API_KEY}
      - DEBUG=${DEBUG:-false}
    volumes:
      - uploads-data:/app/uploads
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aiforum-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: aiforum-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiforum-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  mysql-data:
  redis-data:
  uploads-data:

networks:
  aiforum-network:
    driver: bridge
