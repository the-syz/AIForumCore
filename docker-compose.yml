version: '3.8'

services:
  # MySQL服务
  mysql:
    image: mysql:8.0
    container_name: aiforum-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aiforum
      MYSQL_USER: aiforum
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  # Redis服务
  redis:
    image: redis:6
    container_name: aiforum-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiforum-backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    env_file:
      - .env
    restart: unless-stopped

  # 前端服务（可选，开发时通常单独启动）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiforum-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data: